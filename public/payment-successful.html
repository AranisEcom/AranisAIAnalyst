<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berjaya | ARANIS ECOM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ★ META PIXEL — Ganti YOUR_PIXEL_ID -->
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1241100314677442');
        fbq('track', 'PageView');
    </script>
    <noscript>
        <img height="1" width="1" style="display:none"
             src="https://www.facebook.com/tr?id=1241100314677442&ev=PageView&noscript=1"/>
    </noscript>

    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-card: #181b21;
            --primary: #8b5cf6;
            --secondary: #3b82f6;
            --accent: #34d399;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --gradient-text: linear-gradient(90deg, #c084fc, #60a5fa);
            --gradient-bg: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.3; pointer-events: none; }
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: var(--secondary); bottom: 0; right: -50px; }

        .container { max-width: 500px; width: 100%; text-align: center; position: relative; z-index: 10; }
        
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .icon-circle {
            width: 76px; height: 76px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin: 0 auto 24px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .icon-circle.success { background: rgba(52, 211, 153, 0.1); color: var(--accent); }
        .icon-circle.pending { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
        .icon-circle.fail    { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .icon-circle.warn    { background: rgba(251, 146, 60, 0.1); color: #fb923c; }

        h1 { font-size: 1.7rem; margin-bottom: 12px; font-weight: 800; line-height: 1.2; }
        h1 span { background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; font-size: 0.92rem; }
        p.small { font-size: 0.78rem; color: #555; margin-top: 15px; }

        .detail-box {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 16px 18px;
            text-align: left;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 6px; font-size: 0.82rem;
        }
        .detail-row:last-child { margin-bottom: 0; }
        .label { color: var(--text-muted); }
        .value { color: white; font-weight: 600; font-family: monospace; font-size: 0.78rem; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 28px; border-radius: 50px; text-decoration: none;
            font-weight: 700; font-size: 0.9rem; transition: all 0.3s;
            border: none; cursor: pointer; width: 100%;
        }
        .btn-primary {
            background: var(--gradient-bg); color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4); }
        .btn-ghost {
            background: transparent; color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); color: white; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 5px; }

        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 20px 0; }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease-out 0.2s both; }

        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            width: 34px; height: 34px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            h1 { font-size: 1.45rem; }
            .card { padding: 28px 20px; }
            .btn { padding: 13px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="container">
        <div class="card" id="main-card">
            <div class="loader"></div>
            <p>Memproses status pembayaran...</p>
        </div>
    </div>

    <script>
        // =============================================
        // ★ CONFIGURATION
        // =============================================
        // Ganti dengan URL Google Script yang sama di checkout.html
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbypXoKwae2sZAfrvJ4UO6ODKfefOubF_1s3dEppD4Lw_zClGKy_sdgsJ2s2XD9WGxKk/exec';
        
        // Ganti dengan nombor WhatsApp anda
        const SUPPORT_WHATSAPP = '601127412402';

        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            const params   = new URLSearchParams(window.location.search);
            const statusId = params.get('status_id');
            const billCode = params.get('billcode');
            const orderId  = params.get('order_id');    // ★ URL returns order_id
            const txnId    = params.get('transaction_id');
            const msg      = params.get('msg');

            const card = document.getElementById('main-card');

            // ── ELAKKAN DUPLICATE PURCHASE pada refresh ──
            if (statusId === '1' && sessionStorage.getItem('purchase_fired_' + orderId)) {
                // Purchase sudah pernah di-fire, skip Pixel/CAPI tapi tunjuk UI biasa
                processSuccess(card, orderId, billCode);
                return;
            }

    

            // ── NO PARAMS ──
            if (!statusId) {
                card.innerHTML = renderNoAccess();
                return;
            }

            // ── STATUS 1: SUCCESS ──
            if (statusId === '1') {
                firePixelPurchase(orderId, txnId);
                processSuccess(card, orderId, billCode);
                return;
            }

            // ── STATUS 2: PENDING ──
            if (statusId === '2') {
                card.innerHTML = renderPending(orderId, billCode);
                return;
            }

            // ── STATUS 3: FAILED ──
            if (statusId === '3') {
                card.innerHTML = renderFailed(orderId, billCode, txnId, msg);
                return;
            }

            // ── UNKNOWN ──
            card.innerHTML = renderUnknown(orderId, billCode);
        });

        // =============================================
        // SUCCESS: Update Google Sheet + Send Email
        // =============================================
        async function processSuccess(card, orderId, billCode) {
            try {
                // Call Google Script → updatePayment action
                const formData = new URLSearchParams();
                formData.append('action', 'updatePayment');
                formData.append('orderId', orderId);

                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData,
                    redirect: 'follow'  // Critical for Google Scripts
                });

                const result = await response.json();
                console.log('Google Script updatePayment result:', result);

                if (result.status === 'success') {
                    // Full success: Sheet updated + Email sent
                    card.innerHTML = renderFullSuccess(orderId, billCode);
                } else {
                    // Script responded but with error
                    throw new Error(result.message || 'Sheet update failed');
                }

            } catch (error) {
                console.error('Update failed:', error);
                
                // Payment IS successful, but backend update failed
                // Customer still gets product via ToyyibPay callback or manual check
                card.innerHTML = renderPartialSuccess(orderId, billCode, error.message);
            }
        }

                // =============================================
        // RENDER: Full Success (with email reminder)
        // =============================================
        function renderFullSuccess(orderId, billCode) {
            return `
                <div class="icon-circle success">
                    <i class="fas fa-check"></i>
                </div>
                <h1>Pembayaran <span>Berjaya!</span></h1>
                <p>Pesanan anda telah disahkan.</p>

                <div class="detail-box fade-in">
                    <div class="detail-row">
                        <span class="label">ID Pesanan</span>
                        <span class="value">${orderId || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">No. Bil</span>
                        <span class="value">${billCode || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Status</span>
                        <span class="value" style="color:var(--accent);">✓ Pembayaran Diterima</span>
                    </div>
                </div>

                <!-- ★ EMAIL REMINDER BOX -->
                <div class="email-reminder fade-in">
                    <div class="reminder-icon">
                        <i class="fas fa-envelope-open-text"></i>
                    </div>
                    <div class="reminder-content">
                        <strong>E-mel Pengesahan Dalam 10 Minit</strong>
                        <p>Sila semak inbox anda untuk e-mel dari <strong>ARANIS ECOM</strong>. E-mel ini mengandungi akses penuh kepada produk anda.</p>
                        
                        <div class="reminder-steps">
                            <div class="step">
                                <span class="step-num">1</span>
                                <span>Buka inbox e-mel anda</span>
                            </div>
                            <div class="step">
                                <span class="step-num">2</span>
                                <span>Cari e-mel dari <strong>ARANIS ECOM</strong></span>
                            </div>
                            <div class="step">
                                <span class="step-num">3</span>
                                <span>Tiada? Semak folder <strong class="spam-highlight">Spam / Junk</strong></span>
                            </div>
                        </div>

                        <div class="spam-tip">
                            <i class="fas fa-lightbulb"></i>
                            <span>Jumpa di Spam? Buka e-mel → Klik <strong>"Not Spam"</strong> atau <strong>"Report bukan spam"</strong> supaya e-mel akan datang ke inbox.</span>
                        </div>
                    </div>
                </div>

                <div class="btn-group fade-in">
                    <a href="https://aranis-aiadsanalyst.vercel.app/" class="btn btn-primary">
                        <i class="fas fa-home"></i> Kembali ke Laman Utama
                    </a>
                </div>

                <p class="small fade-in">
                    Dah lepas 10 minit masih tak terima e-mel? 
                    <a href="https://wa.me/${SUPPORT_WHATSAPP}?text=Halo, saya sudah bayar tapi belum terima email selepas 10 minit. Order ID: ${orderId}" 
                       target="_blank" style="color:var(--primary); text-decoration:none; font-weight:600;">WhatsApp Kami</a>
                </p>
            `;
        }

        // =============================================
        // RENDER: Partial Success (Payment ok, backend fail)
        // =============================================
        function renderPartialSuccess(orderId, billCode, errorMsg) {
            return `
                <div class="icon-circle warn">
                    <i class="fas fa-exclamation"></i>
                </div>
                <h1>Pembayaran <span>Diterima</span></h1>
                <p>Pembayaran anda berjaya, tetapi kami menghadapi masalah teknikal kecil menghantar e-mel. Jangan risau — pesanan anda telah direkodkan.</p>

                <div class="detail-box fade-in">
                    <div class="detail-row">
                        <span class="label">ID Pesanan</span>
                        <span class="value">${orderId || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">No. Bil</span>
                        <span class="value">${billCode || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Status</span>
                        <span class="value" style="color:#fb923c;">⚠ Perlu Sahkan</span>
                    </div>
                </div>

                <div class="btn-group fade-in">
                    <a href="https://wa.me/${SUPPORT_WHATSAPP}?text=Halo, payment saya berjaya tapi tak terima email auto. Order ID: ${orderId}" 
                       target="_blank" class="btn btn-primary">
                        <i class="fab fa-whatsapp"></i> WhatsApp Kami untuk E-mel
                    </a>
                    <a href="https://aranis-aiadsanalyst.vercel.app/" class="btn btn-ghost">
                        <i class="fas fa-home"></i> Kembali ke Laman Utama
                    </a>
                </div>
            `;
        }

        // =============================================
        // RENDER: Pending
        // =============================================
        function renderPending(orderId, billCode) {
            return `
                <div class="icon-circle pending">
                    <i class="fas fa-clock"></i>
                </div>
                <h1>Pembayaran <span>Dalam Proses</span></h1>
                <p>Transaksi anda sedang diproses oleh bank. Ini biasanya mengambil beberapa minit sahaja.</p>

                <div class="detail-box fade-in">
                    <div class="detail-row">
                        <span class="label">ID Pesanan</span>
                        <span class="value">${orderId || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">No. Bil</span>
                        <span class="value">${billCode || '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Status</span>
                        <span class="value" style="color:#fbbf24;">⏳ Menunggu</span>
                    </div>
                </div>

                <div class="btn-group fade-in">
                    <a href="javascript:void(0)" class="btn btn-primary" onclick="location.reload()">
                        <i class="fas fa-sync-alt"></i> Semak Semula Status
                    </a>
                </div>

                <p class="small fade-in">
                    Dah lebih 15 minit masih pending? 
                    <a href="https://wa.me/${SUPPORT_WHATSAPP}?text=Halo, payment saya masih pending. Order ID: ${orderId}" 
                       target="_blank" style="color:var(--primary); text-decoration:none;">Hubungi Kami</a>
                </p>
            `;
        }

        // =============================================
        // RENDER: Failed
        // =============================================
        function renderFailed(orderId, billCode, txnId, msg) {
            const decodedMsg = msg ? decodeURIComponent(msg) : 'Transaksi tidak berjaya. Sila cuba lagi.';
            
            return `
                <div class="icon-circle fail">
                    <i class="fas fa-times"></i>
                </div>
                <h1>Pembayaran <span>Gagal</span></h1>
                <p>${decodedMsg}</p>

                <div class="detail-box fade-in">
                    <div class="detail-row">
                        <span class="label">No. Bil</span>
                        <span class="value">${billCode || '-'}</span>
                    </div>
                    ${txnId ? `
                    <div class="detail-row">
                        <span class="label">ID Transaksi</span>
                        <span class="value">${txnId}</span>
                    </div>` : ''}
                </div>

                <div class="btn-group fade-in">
                    <a href="https://aranis-aiadsanalyst.vercel.app/checkout.html" class="btn btn-primary">
                        <i class="fas fa-redo"></i> Cuba Bayar Semula
                    </a>
                    <a href="https://wa.me/${SUPPORT_WHATSAPP}?text=Halo, payment saya gagal. Bill Code: ${billCode}" 
                       target="_blank" class="btn btn-ghost">
                        <i class="fab fa-whatsapp"></i> Hubungi WhatsApp
                    </a>
                </div>
            `;
        }

        // =============================================
        // RENDER: Unknown Status
        // =============================================
        function renderUnknown(orderId, billCode) {
            return `
                <div class="icon-circle warn">
                    <i class="fas fa-question"></i>
                </div>
                <h1>Status <span>Tidak Pasti</span></h1>
                <p>Kami tidak dapat mengesan status pembayaran anda. Jika wang sudah ditolak, pesanan anda tetap selamat.</p>

                <div class="detail-box fade-in">
                    <div class="detail-row">
                        <span class="label">ID Pesanan</span>
                        <span class="value">${orderId || '-'}</span>
                    </div>
                </div>

                <div class="btn-group fade-in">
                    <a href="https://wa.me/${SUPPORT_WHATSAPP}?text=Halo, status payment saya tak pasti. Order ID: ${orderId}" 
                       target="_blank" class="btn btn-primary">
                        <i class="fab fa-whatsapp"></i> Hubungi Kami untuk Sahkan
                    </a>
                    <a href="https://aranis-aiadsanalyst.vercel.app/" class="btn btn-ghost">
                        <i class="fas fa-home"></i> Kembali ke Utama
                    </a>
                </div>
            `;
        }

        // =============================================
        // RENDER: No Access
        // =============================================
        function renderNoAccess() {
            return `
                <div class="icon-circle fail">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Tiada Data Pesanan</h1>
                <p>Halaman ini hanya boleh diakses selepas proses pembayaran.</p>
                <div class="btn-group fade-in">
                    <a href="https://aranis-aiadsanalyst.vercel.app/" class="btn btn-primary">
                        <i class="fas fa-home"></i> Kembali ke Utama
                    </a>
                </div>
            `;
        }

                // =============================================
        // META PIXEL + CAPI: Purchase Event
        // eventID = purchase_{orderId} untuk deduplication
        // =============================================
        function firePixelPurchase(orderId, txnId) {
            var eventId = 'purchase_' + (orderId || txnId || Date.now());

            // Baca hashed user data dari localStorage (diset oleh checkout.html)
            var capiData = null;
            try {
                capiData = JSON.parse(localStorage.getItem('meta_capi_data') || 'null');
            } catch (e) { /* ignore */ }

            console.log('[Pixel+CAPI] Purchase eventID:', eventId);
            console.log('[Pixel+CAPI] Stored CAPI data:', capiData);

            // Tanda sebagai sudah di-fire — elakkan duplicate pada refresh
            if (orderId) {
                sessionStorage.setItem('purchase_fired_' + orderId, '1');
            }

            // --- PIXEL: Purchase ---
            try {
                if (typeof fbq !== 'undefined') {
                    fbq('track', 'Purchase', {
                        value: 35.90,
                        currency: 'MYR',
                        content_name: 'Master Prompt: Meta Analyst AI',
                        content_category: 'Digital Product',
                        content_ids: ['meta-analyst-ai'],
                        content_type: 'product',
                        order_id: orderId,
                        transaction_id: txnId
                    }, { eventID: eventId });
                    console.log('[Pixel] Purchase fired');
                }
            } catch (e) {
                console.log('[Pixel] Purchase error:', e);
            }

            // --- CAPI: Purchase (server-side via Vercel) ---
            if (capiData) {
                fetch('/api/conversion-api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event_name: 'Purchase',
                        event_id: eventId,
                        event_source_url: window.location.href,
                        action_source: 'website',
                        user_data: {
                            em: capiData.em || '',
                            ph: capiData.ph || '',
                            fbc: capiData.fbc || '',
                            fbp: capiData.fbp || ''
                        },
                        custom_data: {
                            currency: 'MYR',
                            value: 35.90,
                            content_ids: ['meta-analyst-ai'],
                            content_name: 'Master Prompt: Meta Analyst AI',
                            content_category: 'Digital Product',
                            content_type: 'product',
                            order_id: orderId,
                            transaction_id: txnId || ''
                        }
                    })
                }).then(function(r) { return r.json(); })
                  .then(function(result) {
                      console.log('[CAPI] Purchase response:', result);
                  })
                  .catch(function(err) {
                      console.log('[CAPI] Purchase error:', err);
                  });

                // Clear — hanya guna sekali
                localStorage.removeItem('meta_capi_data');
            } else {
                console.log('[CAPI] Skip — tiada stored user data (user mungkin refresh page)');
            }
        }
    </script>
</body>
</html>
